<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Galarraga Eventos</title>
    
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            
            <h2>Cadastro</h2>
            
            <form id="form-cadastro">
                
                <div class="input-group">
                    <input type="email" id="cad-email" placeholder="maetafelipe@gmail.com" required />
                </div>
                
                <div class="input-group">
                    <input type="password" id="cad-senha" placeholder="••••••••" required />
                </div>
                
                <button type="submit" class="btn-entrar">Cadastrar</button>
            </form>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
