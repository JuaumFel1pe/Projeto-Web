<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Galarraga Eventos</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <nav>
      <a href="/">
        <img
          src="https://i.ibb.co/mCKymdJG/Design-sem-nome-removebg-preview.png"
          alt="logo"
          class="logo-pesquisa"
        />
      </a>
      <div class="barra-pesquisa">
        <input type="text" placeholder="Pesquisar..." />
        <img
          id="lupa"
          src="https://cdn-icons-png.flaticon.com/512/3183/3183361.png"
          alt="Lupa de pesquisa"
        />
      </div>

      <div class="buttons">
        <a
          href="../login/login.html?modo=registro"
          id="botao-registrar"
          class="btn-nav"
          >Registrar-se</a
        >
        <a
          href="../login/login.html?modo=login"
          id="botao-login"
          class="btn-nav"
          >Login</a
        >
      </div>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <span>GALARRAGA EVENTOS</span>
        <h1>
          EVENTOS <br />
          CORPORATIVOS
        </h1>
        <p>
          Entenda que cultura, <br />
          gastronomia e shows <br />
          fazem parte de todos nós.
        </p>
        <a href="#" class="hero-btn">entre em contato</a>
      </div>
    </section>

    <section class="sessao2-home">
      <div class="main-container-s2">
        <div class="text-column-s2">
          <div class="title-wrapper-s2">
            <div class="purple-line-s2"></div>
            <h1 class="title-text-s2">
              O FOCO É A<br />
              INTEGRAÇÃO DA<br />
              CULTURA<br />
              VENEZUELA<br />
              E BRASIL
            </h1>
          </div>
          <div class="small-image-box-s2">
            <svg
              width="231"
              height="173"
              viewBox="0 0 231 173"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect width="231" height="173" rx="36" fill="#2A0D62" />
            </svg>
          </div>
        </div>

        <div class="image-column-s2">
          <div class="main-collage-box-s2">
            <svg
              width="603"
              height="420"
              viewBox="0 0 603 420"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect width="603" height="420" fill="#11032B" />
            </svg>
          </div>
        </div>
      </div>
    </section>

    <section class="eventos-home">
      <span id="separador-ev"></span>

      <h1 class="titulo-ev"><span id="cor-ev">Eventos</span> Disponíveis</h1>

      <div class="eventos-container-ev">
        <a href="/evento" class="card-ev">
          <span class="separador-card-ev"></span>
          <h3 class="titulo-card-ev">Festa de fim de ano</h3>
        </a>

        <a href="/evento" class="card-ev">
          <span class="separador-card-ev"></span>
          <h3 class="titulo-card-ev">Jantar Beneficente</h3>
        </a>

        <a href="/evento" class="card-ev">
          <span class="separador-card-ev"></span>
          <h3 class="titulo-card-ev">Laureno "El miedo"</h3>
        </a>
      </div>
    </section>

    <script src="home.js"></script>
  </body>
</html>
