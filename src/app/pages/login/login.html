<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conectar - Galarraga Eventos</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    
    <div class="modal-container">
      <button class="close-btn" onclick="window.location.href='../home/home.html'">&times;</button>

      <div id="login-form">
        <h1>Informe seus dados credenciais!</h1>
        
        <input
          type="email"
          id="login-email"
          placeholder="Informe seu E-mail"
        />

        <input
          type="password"
          id="login-senha"
          placeholder="Informe sua Senha"
        />

        <button class="btn-continuar" onclick="fazerLogin()">Continuar</button>
        
        <div class="footer-modal">
            <p>Não possui uma conta? <a href="login.html?modo=registro">Registre-se</a></p>
        </div>
      </div>

      <div id="registro-form">
        <h1>Crie suas credenciais de acesso!</h1>
        
        <input
          type="email"
          id="registro-email"
          placeholder="Informe seu E-mail"
        />

        <input
          type="password"
          id="registro-senha"
          placeholder="Informe sua Senha"
        />

        <button class="btn-continuar" onclick="registrar()">Registrar</button>
        
        <div class="footer-modal">
            <p>Já possui uma conta? <a href="login.html?modo=login">Fazer Login</a></p>
        </div>
      </div>

    </div>

    <script src="login.js"></script>
  </body>
</html>
