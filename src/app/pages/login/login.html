<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galarraga Eventos - Autenticação</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">

      <div id="login-form">
        <h1>Login</h1>
        <input
          type="email"
          id="login-email"
          placeholder="Digite seu email"
        />
        <input
          type="password"
          id="login-senha"
          placeholder="Digite sua senha"
        />
        <button onclick="fazerLogin()">Entrar</button>
      </div>

      <div id="registro-form">
        <h1>Registrar-se</h1>
        <input
          type="email"
          id="registro-email"
          placeholder="Digite seu email"
        />
        <input
          type="password"
          id="registro-senha"
          placeholder="Digite sua senha"
        />
        <button onclick="registrar()">Registrar</button>
      </div>

    </div>

    <script src="index.js"></script>
  </body>
</html>
