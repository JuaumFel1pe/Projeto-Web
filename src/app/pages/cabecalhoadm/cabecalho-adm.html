<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabeçalho Admin</title>
    <link rel="stylesheet" href="cabecalho-adm.css">
</head>
<body>

    <nav>
        <a href="/" class="logo-pesquisa">
            <svg id="logo" width="37" height="37" viewBox="0 0 37 37" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <rect width="37" height="37" fill="url(#pattern0_13_12)"/>
                <defs>
                    <pattern id="pattern0_13_12" patternContentUnits="objectBoundingBox" width="1" height="1">
                        <use xlink:href="#image0_13_12" transform="scale(0.002)"/>
                    </pattern>
                </defs>
            </svg>

            <div class="barra-pesquisa">
                <input type="text" placeholder="Pesquisar...">
                <img id="lupa" src="lupa.png" alt="Lupa">
            </div>
        </a>
        
        <div class="buttons">
            <p>Bem-vindo, Admin!</p>
            <a href="/logout" id="botao-sair" class="btn-sair">Sair</a>
        </div>
    </nav>

    <script src="cabecalho-adm.js"></script>
</body>
</html>
